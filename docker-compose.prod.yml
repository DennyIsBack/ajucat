version: '3.9'

# Compose de produção com Nginx
# Uso: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  nginx:
    image: nginx:alpine
    container_name: ajucat_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - ajucat_network

  backend:
    ports: []  # Remove exposição direta em produção (acesso via Nginx)

  frontend:
    ports: []  # Remove exposição direta em produção (acesso via Nginx)

volumes:
  nginx_logs:
    driver: local
